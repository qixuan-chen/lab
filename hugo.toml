baseURL = "https://kindlezhang.github.io/chenlab/"
# [en, zh-cn, fr, ...] determines default content language
defaultContentLanguage = "en"
# language code
languageCode = "en"
title = "Qixuan Chen's Lab"

# Change the default theme to be use when building the site with Hugo
theme = "DoIt"

[params]
  #  DoIt theme version
  version = "0.4.X"
  # website title
  title = "My New Hugo Site"
  # site description
  description = "Welcome to my lab's homepage"
  # site keywords
  keywords = ["Theme", "Hugo"]
  #  site default theme ("light", "dark", "black", "auto")
  defaultTheme = "auto"
  # public git repo url only then enableGitInfo is true
  gitRepo = ""
  #  which hash function used for SRI, when empty, no SRI is used
  # ("sha256", "sha384", "sha512", "md5")
  fingerprint = ""
  #  date format
  dateFormat = "2006-01-02"
  # website images for Open Graph and Twitter Cards
  images = ["/logo.png"]
  #  enable PWA support
  enablePWA = false
  # [Experimental] cache remote images in markdown, more info: https://github.com/HEIGE-PCloud/DoIt/pull/860#issue-1574342372
  cacheRemoteImages = true
  # [Experimental] generate image srcset attribute with hugo image processing feature.
  optimizeImages = true
  # [Experimental] resize method for srcset attribute in optimizeImages, more info: https://gohugo.io/content-management/image-processing/#image-processing-options
  srcsetSmallResizeMethod = "700x webp Lanczos q75"
  srcsetDefaultResizeMethod = "1200x webp Lanczos q75"
  srcsetLargeResizeMethod = "2000x webp Lanczos q75"
  #  License information
  license = '<a rel="license external nofollow noopener noreferrer" href="https://creativecommons.org/licenses/by-nc/4.0/" target="_blank">CC BY-NC 4.0</a>'
  # Author config
  [params.author]
    name = "xxxx"
    email = ""
    link = ""
    avatar = ""
    gravatarEmail = ""
  #  App icon config
  [params.app]
    # optional site title override for the app when added to an iOS home screen or Android launcher
    title = "DoIt"
    # whether to omit favicon resource links
    noFavicon = false
    # modern SVG favicon to use in place of older style .png and .ico files
    svgFavicon = ""
    # Safari mask icon color
    iconColor = "#5bbad5"
    # Windows v8-10 tile color
    tileColor = "#da532c"

  #  Search config
  [params.search]
    enable = true
    # type of search engine ("algolia", "fuse")
    type = "fuse"
    # max index length of the chunked content
    contentLength = 4000
    # placeholder of the search bar
    placeholder = ""
    #  max number of results length
    maxResultLength = 10
    #  snippet length of the result
    snippetLength = 30
    #  HTML tag name of the highlight part in results
    highlightTag = "em"
    #  whether to use the absolute URL based on the baseURL in search index
    absoluteURL = false
    [params.search.algolia]
      index = ""
      appID = ""
      searchKey = ""
    [params.search.fuse]
      #  https://fusejs.io/api/options.html
      isCaseSensitive = false
      minMatchCharLength = 2
      findAllMatches = false
      location = 0
      threshold = 0.3
      distance = 100
      ignoreLocation = false
      useExtendedSearch = false
      ignoreFieldNorm = false

  [params.image]
    # cache remote images for better optimisations
    cacheRemote = true
    # Image resizing and optimisation
    optimise = true
  # Header config
  [params.header]
    #  Theme change mode
    # theme change mode ("switch", "select")
    themeChangeMode = "select"
    #  Header title config
    [params.header.title]
      # URL of the LOGO
      logo = "/images/mailman_biostats_4c_horiz.png"
      # title name
      name = ""
      # you can add extra information before the name (HTML format is supported), such as icons
      pre = ""
      # you can add extra information after the name (HTML format is supported), such as icons
      post = ""
      #  whether to use typeit animation for title name
      typeit = false

  # Footer config
  [params.footer]
    enable = true
    #  Custom content (HTML format is supported)
    custom = """
    <div class="custom-share-footer">
      <h2>Qixuan Chen's Lab</h2>
      <p>Share on</p>
      <div class="share-icons">
        <a href="https://github.com/xxxx" target="_blank" rel="noopener noreferrer" aria-label="GitHub" class="share-icon-link">
          <svg viewBox="0 0 24 24" class="share-icon-svg" fill="currentColor" aria-hidden="true">
            <path d="M12 .5a12 12 0 0 0-3.79 23.39c.6.11.82-.26.82-.58v-2.03c-3.34.73-4.04-1.41-4.04-1.41-.55-1.38-1.34-1.75-1.34-1.75-1.1-.74.08-.73.08-.73 1.21.09 1.85 1.23 1.85 1.23 1.08 1.83 2.84 1.3 3.53.99.11-.77.42-1.3.76-1.6-2.67-.3-5.47-1.32-5.47-5.9 0-1.31.47-2.38 1.24-3.22-.12-.31-.54-1.55.12-3.24 0 0 1.01-.32 3.3 1.23a11.6 11.6 0 0 1 6 0c2.28-1.55 3.29-1.23 3.29-1.23.66 1.69.24 2.93.12 3.24.77.84 1.24 1.91 1.24 3.22 0 4.59-2.8 5.6-5.48 5.89.43.37.81 1.09.81 2.2v3.26c0 .32.21.69.82.58A12 12 0 0 0 12 .5z"/>
          </svg>
        </a>

        <a href="https://www.linkedin.com/in/qixuan-chen-30819ba/" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn" class="share-icon-link">
          <svg viewBox="0 0 24 24" class="share-icon-svg" fill="currentColor" aria-hidden="true">
            <path d="M4.98 3.5C4.98 4.88 3.86 6 2.48 6S0 4.88 0 3.5 1.12 1 2.48 1s2.5 1.12 2.5 2.5zM.5 8h4V24h-4V8zm7 0h3.83v2.16h.05c.53-1.01 1.84-2.16 3.79-2.16 4.05 0 4.8 2.67 4.8 6.14V24h-4v-7.44c0-1.78-.03-4.07-2.48-4.07-2.48 0-2.86 1.94-2.86 3.95V24h-4V8z"/>
          </svg>
        </a>

        <a href="mailto:qc2138@cumc.columbia.edu" aria-label="Email" class="share-icon-link">
          <svg viewBox="0 0 24 24" class="share-icon-svg" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <rect x="2" y="4" width="20" height="16" rx="2"></rect>
            <path d="M22 6 12 13 2 6"></path>
          </svg>
        </a>

        <a href="/files/2026_01_CV_CHEN.pdf" target="_blank" rel="noopener noreferrer" aria-label="CV" class="share-icon-link share-cv-link">
          <span class="share-cv-text">CV</span>
        </a>
      </div>
    </div>
    """
    #  whether to show Hugo and theme info
    hugo = false
    #  Hosted on (HTML format is supported)
    # <a title="Github Pages" href="https://docs.github.com/en/pages/" target="_blank" rel="noopener noreferrer">GitHub Pages</a>
    hostedOn = ''
    #  whether to show copyright info
    copyright = false
